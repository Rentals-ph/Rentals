[phases.setup]
nixPkgs = ["php82", "php82Extensions.pdo", "php82Extensions.pdo_pgsql", "php82Extensions.mbstring", "php82Extensions.xml", "php82Extensions.curl", "php82Extensions.zip", "php82Packages.composer"]

[phases.install]
cmds = ["composer install --no-dev --optimize-autoloader --classmap-authoritative --no-scripts --no-interaction"]

[phases.build]
cmds = []

[start]
cmd = "php artisan serve --host=0.0.0.0 --port=${PORT:-8000}"